<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>إضافة عقار - Star House</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .form-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 700px;
            margin: 0 auto;
        }
        h1 { color: #1f2937; margin-bottom: 30px; text-align: center; }
        label { display: block; margin-bottom: 5px; color: #374151; font-weight: bold; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; }
        textarea { resize: vertical; min-height: 100px; }
        .row { display: flex; gap: 15px; }
        .row > div { flex: 1; }
        button {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover { background: #059669; }
        .back { text-align: center; margin-top: 20px; }
        .back a { color: #3b82f6; text-decoration: none; }
        small { color: #6b7280; display: block; margin-top: -15px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1>إضافة عقار جديد</h1>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div style="padding: 12px; margin-bottom: 15px; border-radius: 8px; text-align: center;
                        {% if category == 'success' %}background: #d1fae5; color: #065f46;{% else %}background: #fee2e2; color: #991b1b;{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" enctype="multipart/form-data">
            <label>عنوان العقار</label>
            <input type="text" name="title" placeholder="مثال: شقة سوبر لوكس في سموحة" required>
            
            <label>الوصف</label>
            <textarea name="description" placeholder="اكتب تفاصيل العقار..." required></textarea>
            
            <div class="row">
                <div>
                    <label>السعر</label>
                    <input type="number" name="price" placeholder="السعر بالجنيه" required>
                </div>
                <div>
                    <label>المساحة</label>
                    <input type="number" name="area" placeholder="بالمتر المربع" required>
                </div>
            </div>
            
            <div class="row">
                <div>
                    <label>نوع العقار</label>
                    <select name="property_type" required>
                        <option value="">اختر النوع</option>
                        <option value="شقة">شقة</option>
                        <option value="فيلا">فيلا</option>
                        <option value="محل">محل</option>
                        <option value="مكتب">مكتب</option>
                        <option value="أرض">أرض</option>
                    </select>
                </div>
                <div>
                    <label>نوع العرض</label>
                    <select name="listing_type" required>
                        <option value="">اختر</option>
                        <option value="بيع">بيع</option>
                        <option value="إيجار">إيجار</option>
                    </select>
                </div>
            </div>
            
            <label>الموقع</label>
            <input type="text" name="location" placeholder="مثال: سموحة، الإسكندرية" required>
            
            <div class="row">
                <div>
                    <label>عدد الغرف</label>
                    <input type="number" name="bedrooms" placeholder="0" min="0">
                </div>
                <div>
                    <label>عدد الحمامات</label>
                    <input type="number" name="bathrooms" placeholder="0" min="0">
                </div>
            </div>
            
            <label>صور العقار</label>
            <input type="file" name="images" multiple accept="image/*" required>
            <small>تقدر تختار لحد 10 صور - أول صورة هتكون الصورة الرئيسية</small>
            
            <button type="submit">نشر العقار</button>
        </form>
        
        <div class="back">
            <a href="/">← رجوع للرئيسية</a>
        </div>
    </div>
</body>
</html>
